<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA Global Corporation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Flyer Section: Locked to Full Window Width -->
    <div class="viewport-frame">
        <img src="flyer-bg.jpg" alt="SA Global Flyer Layout" class="unclipped-flyer">
    </div>

    <!-- 100% Custom Slider Section Below -->
    <div class="slider-section">
        <h2 class="slider-title">Our Recent Projects</h2>
        
        <div class="custom-slider-container">
            <div class="custom-slider" id="slider">
                <div class="custom-slide active"><img src="flyer-bg.jpg" alt="Project 1"></div>
                <div class="custom-slide"><img src="flyer-bg.jpg" alt="Project 2"></div>
                <div class="custom-slide"><img src="flyer-bg.jpg" alt="Project 3"></div>
            </div>
            <!-- Navigation Arrows -->
            <button class="nav-btn prev-btn" id="prevBtn">❮</button>
            <button class="nav-btn next-btn" id="nextBtn">❯</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
